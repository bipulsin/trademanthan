  <rect x="18" y="8" width="4" height="6" rx="1" fill="url(#cogsGrad)"/>
  <rect x="18" y="34" width="4" height="6" rx="1" fill="url(#cogsGrad)"/>
  <rect x="8" y="18" width="6" height="4" rx="1" fill="url(#cogsGrad)"/>
  <rect x="34" y="18" width="6" height="4" rx="1" fill="url(#cogsGrad)"/>
  <circle cx="28" cy="28" r="7" fill="none" stroke="url(#cogsGrad2)" stroke-width="2.5"/>
  <circle cx="28" cy="28" r="3" fill="url(#cogsGrad2)"/>
  <rect x="26" y="19" width="4" height="5" rx="1" fill="url(#cogsGrad2)"/>
