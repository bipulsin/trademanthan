<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR Setup - CAR GPT | Tradentical</title>
    <script src="auth-check.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="left-menu.css">
    <link rel="stylesheet" href="cargpt.css">
</head>
<body class="cargpt-body">
    <div class="mobile-title-bar">
        <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
        <div class="mobile-title-content">
            <img src="tradentical-logo.png" alt="Tradentical" class="mobile-logo">
            <h1 class="mobile-title">CAR GPT Setup</h1>
        </div>
    </div>
    <div class="app-container app-with-left-menu">
        <div id="left-menu-container"></div>
        <main class="main-content-area cargpt-main">
            <section class="cargpt-card collapsible" id="setupCard">
                <h2 id="setupToggle">
                    <span><i class="fas fa-sliders-h"></i> Setup</span>
                    <span id="setupCaret">▼</span>
                </h2>
                <div class="card-body">
                    <div style="margin-bottom: 16px;">
                        <label for="stockList" style="display: block; margin-bottom: 6px; color: var(--cargpt-muted);">Trailing Stock List (comma-separated)</label>
                        <textarea id="stockList" class="cargpt-textarea" placeholder="RELIANCE, TCS, INFY, HDFCBANK"></textarea>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label for="numWeeks" style="display: block; margin-bottom: 6px; color: var(--cargpt-muted);">Number of weeks</label>
                        <input type="number" id="numWeeks" class="cargpt-input" value="52" min="1" max="260" placeholder="52">
                    </div>
                    <button class="cargpt-btn cargpt-btn-primary" id="saveBtn">
                        <i class="fas fa-save"></i> Save
                    </button>
                </div>
            </section>

            <section class="cargpt-card">
                <h2><i class="fas fa-list"></i> Stock List</h2>
                <div class="card-body">
                    <div id="stockListContainer">
                        <div class="cargpt-loading" id="stockListLoading">Loading...</div>
                        <div class="cargpt-table-wrap" id="stockTableWrap" style="display: none;">
                            <table class="cargpt-table">
                                <thead>
                                    <tr>
                                        <th>Symbol</th>
                                        <th>Stock Name</th>
                                        <th>Date Added</th>
                                    </tr>
                                </thead>
                                <tbody id="stockTableBody"></tbody>
                            </table>
                        </div>
                        <div class="cargpt-empty" id="stockListEmpty" style="display: none;">No stocks in list. Add symbols above and save.</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="left-menu.js"></script>
    <script>
        const CARGPT_BASE = '/cargpt';

        function safeParseJson(text) {
            try { return JSON.parse(text); } catch (e) { return null; }
        }

        document.getElementById('setupToggle').addEventListener('click', () => {
            const card = document.getElementById('setupCard');
            const caret = document.getElementById('setupCaret');
            card.classList.toggle('collapsed');
            caret.textContent = card.classList.contains('collapsed') ? '▶' : '▼';
        });

        async function loadConfig() {
            try {
                const r = await fetch(CARGPT_BASE + '/config');
                const text = await r.text();
                const d = safeParseJson(text);
                if (r.ok && d) {
                    document.getElementById('numWeeks').value = d.number_of_weeks || 52;
                }
            } catch (e) {
                console.warn('Could not load config:', e);
            }
        }

        async function loadStockList() {
            const loading = document.getElementById('stockListLoading');
            const wrap = document.getElementById('stockTableWrap');
            const empty = document.getElementById('stockListEmpty');
            loading.style.display = 'block';
            wrap.style.display = 'none';
            empty.style.display = 'none';
            try {
                const r = await fetch(CARGPT_BASE + '/stock-list');
                const text = await r.text();
                const data = safeParseJson(text);
                if (!r.ok) throw new Error('API returned ' + r.status);
                if (data === null) throw new Error('Invalid server response');
                loading.style.display = 'none';
                if (data && Array.isArray(data) && data.length > 0) {
                    wrap.style.display = 'block';
                    const tbody = document.getElementById('stockTableBody');
                    tbody.innerHTML = '';
                    for (const row of data) {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${row.symbol}</td>
                            <td>${row.stock_name || row.symbol}</td>
                            <td>${row.created_at ? new Date(row.created_at).toLocaleDateString() : '-'}</td>
                        `;
                        tbody.appendChild(tr);
                    }
                } else {
                    empty.style.display = 'block';
                }
            } catch (e) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                empty.textContent = 'Error loading list. ' + (e.message || 'Check API connection.');
                console.error('loadStockList error:', e);
            }
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const symbols = document.getElementById('stockList').value.trim();
            const numWeeks = parseInt(document.getElementById('numWeeks').value, 10) || 52;
            if (!symbols) {
                alert('Please enter at least one stock symbol.');
                return;
            }
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            try {
                const r = await fetch(CARGPT_BASE + '/save-stock-list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbols, number_of_weeks: numWeeks })
                });
                const text = await r.text();
                const d = safeParseJson(text);
                if (!d) {
                    alert('Error: Invalid server response. Please try again.');
                } else if (d.success) {
                    alert(d.message || 'Saved.');
                    loadStockList();
                    loadConfig();
                } else {
                    alert(d.message || 'Save failed.');
                }
            } catch (e) {
                alert('Error saving: ' + (e.message || 'Network error'));
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Save';
            }
        });

        loadConfig();
        loadStockList();
    </script>
</body>
</html>
