<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Smart Futures - Tradentical</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
    <script src="auth-check.js?v=1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="left-menu.css?v=3.13">
    <link rel="stylesheet" href="theme.css?v=1.3">
    <link rel="stylesheet" href="settings.css">
    <style>
        .sf-placeholder-card {
            max-width: 720px;
            margin: 0 auto;
            background: var(--theme-card, rgba(255,255,255,0.95));
            border: 1px solid var(--theme-border, #e2e8f0);
            border-radius: 12px;
            padding: 20px 22px;
        }
        .sf-placeholder-card p {
            margin: 0;
            color: var(--theme-muted, #64748b);
            line-height: 1.55;
        }
    </style>
</head>
<body class="theme-page">
    <div class="mobile-title-bar">
        <button class="mobile-menu-toggle" id="mobileMenuToggle" type="button" aria-label="Menu"><i class="fas fa-bars"></i></button>
        <div class="mobile-title-content">
            <img src="tradewithcto-logo.png" alt="TradeWithCTO" class="mobile-logo">
            <h1 class="mobile-title">Smart Futures</h1>
        </div>
    </div>
    <div class="app-container app-with-left-menu">
        <div id="left-menu-container"></div>
        <main class="right-panel main-content-area">
            <div class="settings-header">
                <div class="settings-title-section">
                    <h1 class="settings-title"><i class="fas fa-bolt"></i> Smart Futures</h1>
                    <p class="settings-subtitle">The screener is being rebuilt. Admin parameters remain available on the Admin page.</p>
                </div>
            </div>
            <div class="settings-content">
                <div class="sf-placeholder-card">
                    <p>Check back later for the new NSE F&amp;O workflow. Navigation and layout are unchanged.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="left-menu.js?v=3.15"></script>
    <script src="smartfuture.js?v=13"></script>
</body>
</html>
