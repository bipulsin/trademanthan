<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Smart Futures - Tradentical</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
    <script src="auth-check.js?v=1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="left-menu.css?v=3.19">
    <link rel="stylesheet" href="theme.css?v=1.3">
    <style>
        .sf-wrap { max-width: 1100px; margin: 0 auto; }
        .sf-card {
            background: var(--theme-card, rgba(255,255,255,0.95));
            border: 1px solid var(--theme-border, #e2e8f0);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 18px;
        }
        .sf-card h2 { margin: 0 0 10px; font-size: 1.15rem; }
        .sf-card-head {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        .sf-meta { font-size: 0.88rem; color: var(--theme-muted, #64748b); }
        .sf-table-wrap { overflow-x: auto; }
        table.sf-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        table.sf-table th, table.sf-table td {
            border-bottom: 1px solid var(--theme-border, #e2e8f0);
            text-align: left;
            padding: 8px 6px;
        }
        table.sf-table th { color: var(--theme-muted, #64748b); font-weight: 600; }
        .sf-btn-refresh, .sf-btn-order, .sf-btn-sell {
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .sf-btn-refresh {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            padding: 0;
            border: 1px solid var(--theme-border, #cbd5e1);
            background: var(--theme-card, #f8fafc);
            color: var(--theme-text, #0f172a);
        }
        .sf-btn-refresh:hover:not(:disabled) { background: var(--theme-border, #e2e8f0); }
        .sf-btn-refresh i { font-size: 1rem; }
        .sf-btn-order {
            border: none;
            background: #2563eb;
            color: #fff;
        }
        .sf-btn-order:disabled { opacity: 0.45; cursor: not-allowed; }
        .sf-btn-sell {
            border: none;
            background: #b45309;
            color: #fff;
        }
        .sf-btn-sell:disabled { opacity: 0.45; cursor: not-allowed; }
        .sf-exit-hint {
            display: inline-block;
            margin-right: 6px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            background: #fef3c7;
            color: #92400e;
            vertical-align: middle;
        }
        .sf-sold { font-weight: 600; color: var(--theme-muted, #64748b); }
        .sf-group-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--theme-text, #0f172a);
            margin: 16px 0 8px;
            padding-top: 4px;
            border-top: 1px dashed var(--theme-border, #e2e8f0);
        }
        .sf-group-title:first-child { border-top: none; margin-top: 0; padding-top: 0; }
        .sf-side-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.02em;
        }
        /* Same in light & dark theme: high-contrast pills on the table */
        .sf-side-pill.sf-side-long {
            background: #4ade80;
            color: #000000;
        }
        .sf-side-pill.sf-side-short {
            background: #ef4444;
            color: #ffffff;
        }
        .sf-trend-yes {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #16a34a;
            font-size: 1.05rem;
        }
        .sf-trend-yes .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .sf-brand-icon {
            width: 100px;
            height: 100px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 8px;
            background: transparent;
        }
        .mobile-sf-brand-icon {
            width: 70px;
            height: 70px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 6px;
            background: transparent;
        }
    </style>
</head>
<body class="theme-page">
    <div class="mobile-title-bar">
        <button class="mobile-menu-toggle" id="mobileMenuToggle" type="button" aria-label="Menu"><i class="fas fa-bars"></i></button>
        <div class="mobile-title-content">
            <img src="tradewithcto-logo.png" alt="TradeWithCTO" class="mobile-logo">
            <img src="icons/smart-futures.png?v=3" alt="" class="mobile-sf-brand-icon" width="70" height="70" aria-hidden="true" />
            <h1 class="mobile-title">Smart Futures</h1>
        </div>
    </div>
    <div class="app-container app-with-left-menu">
        <div id="left-menu-container"></div>
        <main class="right-panel main-content-area">
            <div class="settings-header">
                <div class="settings-title-section">
                    <h1 class="settings-title">
                        <img src="icons/smart-futures.png?v=3" class="sf-brand-icon" width="100" height="100" alt="" aria-hidden="true" />
                        Smart Futures
                    </h1>
                    <p class="settings-subtitle">Today&apos;s trend picks (CMS). Use the refresh control in that section to reload data. Admin parameters stay on the Admin page.</p>
                </div>
            </div>
            <div class="settings-content sf-wrap">
                <div class="sf-card">
                    <div class="sf-card-head">
                        <h2><i class="fas fa-chart-line"></i> Today&apos;s Trend</h2>
                        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                            <button type="button" class="sf-btn-refresh" id="sfTrendRefresh" title="Refresh" aria-label="Refresh today&apos;s trend"><i class="fas fa-sync-alt" aria-hidden="true"></i></button>
                            <span class="sf-meta">Session (IST): <span id="sfTrendSession">—</span></span>
                            <span class="sf-meta">Updated: <span id="sfTrendUpdated">—</span></span>
                        </div>
                    </div>
                    <p class="sf-meta" id="sfTrendMsg"></p>
                    <div id="sfTrendGroups"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="left-menu.js?v=3.19"></script>
    <script src="smartfuture.js?v=23"></script>
</body>
</html>
