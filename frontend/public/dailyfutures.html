<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Daily Futures - TradeWithCTO</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=3" />
    <script src="auth-check.js?v=1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="settings.css" />
    <link rel="stylesheet" href="left-menu.css?v=3.19" />
    <link rel="stylesheet" href="theme.css?v=1.3" />
    <style>
        .df-wrap { max-width: 1200px; margin: 0 auto; }
        .df-card {
            background: var(--theme-card, rgba(255,255,255,0.95));
            border: 1px solid var(--theme-border, #e2e8f0);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 18px;
        }
        .df-card h2 { margin: 0 0 10px; font-size: 1.12rem; display: flex; align-items: center; gap: 8px; }
        .df-summary { display: flex; flex-wrap: wrap; gap: 16px; font-size: 0.9rem; color: var(--theme-muted, #64748b); margin: 8px 0 12px; }
        .df-summary strong { color: var(--theme-text, #0f172a); }
        .df-table-wrap { overflow-x: auto; }
        table.df-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
        table.df-table th, table.df-table td {
            border-bottom: 1px solid var(--theme-border, #e2e8f0);
            text-align: left;
            padding: 8px 6px;
        }
        table.df-table th { color: var(--theme-muted, #64748b); font-weight: 600; }
        table.df-table td.num { text-align: right; }
        .df-btn { padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 0.82rem; cursor: pointer; border: none; }
        .df-btn-order { background: #2563eb; color: #fff; }
        .df-btn-sell { background: #b45309; color: #fff; }
        .df-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .df-blink { display: inline-block; color: #ef4444; font-weight: 800; margin-left: 4px; animation: df-blink-anim 0.9s ease-in-out infinite; }
        @keyframes df-blink-anim { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .df-pnl-pos { color: #16a34a; font-weight: 600; }
        .df-pnl-neg { color: #b91c1c; font-weight: 600; }
        .df-wl-win { color: #16a34a; font-weight: 700; }
        .df-wl-loss { color: #b91c1c; font-weight: 700; }
        .df-modal { position: fixed; inset: 0; z-index: 2000; display: none; align-items: center; justify-content: center; }
        .df-modal[aria-hidden="false"] { display: flex; }
        .df-modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
        .df-modal-panel { position: relative; z-index: 1; background: var(--theme-card, #fff); color: var(--theme-text, #0f172a);
            border: 1px solid var(--theme-border, #e2e8f0); border-radius: 12px; padding: 18px; min-width: 300px; max-width: 96vw; }
        .df-modal-panel label { display: block; margin-top: 10px; font-size: 0.88rem; }
        .df-modal-panel input { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 8px; border-radius: 8px; border: 1px solid var(--theme-border, #cbd5e1); }
        .df-modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
        .df-modal-cancel { padding: 8px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--theme-border); background: transparent; }
        #dfBanner { font-size: 0.88rem; color: var(--theme-muted); margin-bottom: 12px; }
    </style>
</head>
<body class="theme-page">
    <div class="mobile-title-bar">
        <button class="mobile-menu-toggle" id="mobileMenuToggleLegacy" type="button" aria-label="Menu"><i class="fas fa-bars"></i></button>
        <div class="mobile-title-content">
            <img src="tradewithcto-logo.png" alt="TradeWithCTO" class="mobile-logo" />
            <i class="fas fa-calendar-day" style="font-size:1.5rem;color:var(--theme-accent,#2563eb);" aria-hidden="true"></i>
            <h1 class="mobile-title">Daily Futures</h1>
        </div>
    </div>
    <div class="app-container app-with-left-menu">
        <div id="left-menu-container"></div>
        <main class="right-panel main-content-area">
            <div class="settings-header">
                <div class="settings-title-section">
                    <h1 class="settings-title"><i class="fas fa-calendar-day" style="margin-right:10px;color:#2563eb;"></i> Daily Futures</h1>
                    <p class="settings-subtitle">FNO stocks Bullish Trend scanner (Moving average + ADX + MACD ) with conviction score &amp; scan score</p>
                </div>
            </div>
            <div class="settings-content df-wrap">
                <p id="dfBanner">Loading workspace…</p>

                <div class="df-card">
                    <h2><i class="fas fa-star"></i> Today&apos;s pick</h2>
                    <div id="dfPicksTable"></div>
                </div>

                <div class="df-card">
                    <h2><i class="fas fa-play"></i> Running order</h2>
                    <div id="dfRunningTable"></div>
                </div>

                <div class="df-card">
                    <h2><i class="fas fa-check-double"></i> Today&apos;s trade</h2>
                    <div class="df-summary" id="dfClosedSummary"></div>
                    <div id="dfClosedTable"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="dfBuyModal" class="df-modal" aria-hidden="true" role="dialog">
        <div class="df-modal-backdrop" id="dfBuyBackdrop"></div>
        <div class="df-modal-panel">
            <h3 style="margin:0 0 8px;">Confirm buy</h3>
            <p id="dfBuySym" style="margin:0;font-size:0.88rem;color:var(--theme-muted);"></p>
            <label>Entry time (IST, HH:MM)</label>
            <input type="text" id="dfBuyTime" autocomplete="off" placeholder="09:45" />
            <label>Entry price (₹)</label>
            <input type="number" id="dfBuyPrice" step="any" min="0" />
            <p id="dfBuyErr" style="color:#b91c1c;min-height:1.2em;font-size:0.85rem;"></p>
            <div class="df-modal-actions">
                <button type="button" class="df-modal-cancel" id="dfBuyCancel">Cancel</button>
                <button type="button" class="df-btn df-btn-order" id="dfBuyOk">Confirm</button>
            </div>
        </div>
    </div>

    <div id="dfSellModal" class="df-modal" aria-hidden="true" role="dialog">
        <div class="df-modal-backdrop" id="dfSellBackdrop"></div>
        <div class="df-modal-panel">
            <h3 style="margin:0 0 8px;">Confirm sell</h3>
            <p id="dfSellSym" style="margin:0;font-size:0.88rem;color:var(--theme-muted);"></p>
            <label>Exit time (IST, HH:MM)</label>
            <input type="text" id="dfSellTime" autocomplete="off" placeholder="15:10" />
            <label>Exit price (₹)</label>
            <input type="number" id="dfSellPrice" step="any" min="0" />
            <p id="dfSellErr" style="color:#b91c1c;min-height:1.2em;font-size:0.85rem;"></p>
            <div class="df-modal-actions">
                <button type="button" class="df-modal-cancel" id="dfSellCancel">Cancel</button>
                <button type="button" class="df-btn df-btn-sell" id="dfSellOk">Confirm sell</button>
            </div>
        </div>
    </div>

    <script src="left-menu.js?v=3.20"></script>
    <script src="dailyfutures.js?v=2"></script>
</body>
</html>
