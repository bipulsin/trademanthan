<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tradentical</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
    <script src="auth-check.js"></script>
    <script>
        (async function () {
            try {
                const API_BASE_URL =
                    window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                        ? 'http://localhost:8000'
                        : 'https://trademanthan.in';
                const token = localStorage.getItem('trademanthan_token') || '';
                if (!token || !token.includes('.')) {
                    window.location.replace('index.html');
                    return;
                }
                let meRes = await fetch(`${API_BASE_URL}/api/auth/me`, {
                    headers: { Authorization: `Bearer ${token}` },
                    cache: 'no-store'
                });
                if (!meRes.ok) {
                    meRes = await fetch(`${API_BASE_URL}/auth/me`, {
                        headers: { Authorization: `Bearer ${token}` },
                        cache: 'no-store'
                    });
                }
                if (!meRes.ok) {
                    window.location.replace('index.html');
                    return;
                }
                const me = await meRes.json();
                const merged = Object.assign({}, JSON.parse(localStorage.getItem('trademanthan_user') || '{}'), me || {});
                localStorage.setItem('trademanthan_user', JSON.stringify(merged));
                if ((String(merged.isAdmin || '').trim()) !== 'Yes') {
                    window.location.replace('dashboard.html');
                }
            } catch (e) {
                window.location.replace('index.html');
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="left-menu.css?v=3.13">
    <link rel="stylesheet" href="theme.css?v=1.3">
    <style>
        .admin-collapsible-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            padding: 6px 2px;
        }
        .admin-collapse-btn {
            border: none;
            background: transparent;
            color: #334155;
            font-size: 16px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
        }
        .admin-collapse-btn:hover {
            background: rgba(15, 23, 42, 0.08);
        }
        .admin-collapsible-content {
            display: none;
        }
        .admin-collapsible-content.expanded {
            display: block;
        }
        .user-activity-mobile {
            display: none;
        }
        .user-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            background: #fff;
        }
        .user-card.blocked {
            background: rgba(239, 68, 68, 0.08);
        }
        .user-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
        }
        .user-card-email {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .user-card-row {
            font-size: 13px;
            color: #334155;
            margin: 4px 0;
        }
        .user-card-actions {
            margin-top: 10px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        @media (max-width: 768px) {
            .user-activity-desktop {
                display: none;
            }
            .user-activity-mobile {
                display: block;
            }
        }
    </style>
</head>
<body class="theme-page">
    <div class="mobile-title-bar">
        <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Menu">
            <i class="fas fa-bars"></i>
        </button>
        <div class="mobile-title-content">
            <img src="tradewithcto-logo.png" alt="TradeWithCTO" class="mobile-logo">
            <h1 class="mobile-title">Tradentical</h1>
        </div>
    </div>

    <div class="app-container app-with-left-menu">
        <div id="left-menu-container"></div>
        <main class="right-panel main-content-area">
            <div class="settings-header">
                <div class="settings-title-section">
                    <h1 class="settings-title">
                        <i class="fas fa-user-shield"></i>
                        Admin
                    </h1>
                    <p class="settings-subtitle">Administrator tools and system configuration (restricted access)</p>
                </div>
            </div>

            <div class="settings-content">
                <div class="settings-section">
                    <div class="section-header admin-collapsible-header" id="userActivityToggle">
                        <div>
                            <h2><i class="fas fa-users"></i> User Activity</h2>
                            <p>Unique users with last login/activity details and quick access controls.</p>
                        </div>
                        <button class="admin-collapse-btn" id="userActivityCollapseBtn" aria-label="Expand user activity" title="Expand/Collapse">
                            <i id="userActivityCollapseIcon" class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <div class="admin-collapsible-content" id="userActivityContent">
                        <div class="setting-card user-activity-desktop">
                            <div style="overflow-x: auto;">
                                <table id="userActivityTable" class="settings-table" style="width: 100%; border-collapse: collapse;">
                                    <thead>
                                        <tr>
                                            <th style="text-align: left; padding: 10px;">User</th>
                                            <th style="text-align: left; padding: 10px;">Last Login</th>
                                            <th style="text-align: left; padding: 10px;">Last Login IP</th>
                                            <th style="text-align: left; padding: 10px;">Last Page Visited</th>
                                            <th style="text-align: left; padding: 10px;">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="userActivityBody">
                                        <tr><td colspan="5" style="padding: 12px;">Expand to load user activity...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="setting-card user-activity-mobile" id="userActivityCards">
                            <div style="padding: 4px 2px;">Expand to load user activity...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="left-menu.js?v=3.15"></script>
    <script src="admintwc.js?v=1.1.0"></script>
    <script src="version.js?v=1.0"></script>
    <script src="cache-manager.js?v=1.1"></script>
</body>
</html>
