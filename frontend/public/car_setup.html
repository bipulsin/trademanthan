<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR Setup - CAR GPT | Trade Manthan</title>
    <link rel="stylesheet" href="cargpt.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="cargpt-body">
    <header class="cargpt-title-bar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="cargpt-hamburger" id="menuToggle" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </button>
            <h1>CAR GPT - Setup</h1>
        </div>
        <nav class="nav-links">
            <a href="car_setup.html" class="active">Setup</a>
            <a href="car_gpt.html">Report</a>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <div class="cargpt-layout">
        <aside class="cargpt-left-menu" id="leftMenu">
            <nav>
                <ul>
                    <li><a href="car_setup.html" class="active"><i class="fas fa-cog"></i> Setup</a></li>
                    <li><a href="car_gpt.html"><i class="fas fa-chart-line"></i> CAR Report</a></li>
                    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                </ul>
            </nav>
        </aside>

        <main class="cargpt-main">
            <!-- Collapsible Setup Section -->
            <section class="cargpt-card collapsible" id="setupCard">
                <h2 id="setupToggle">
                    <span><i class="fas fa-sliders-h"></i> Setup</span>
                    <span id="setupCaret">▼</span>
                </h2>
                <div class="card-body">
                    <div style="margin-bottom: 16px;">
                        <label for="stockList" style="display: block; margin-bottom: 6px; color: var(--cargpt-muted);">Trailing Stock List (comma-separated)</label>
                        <textarea id="stockList" class="cargpt-textarea" placeholder="RELIANCE, TCS, INFY, HDFCBANK"></textarea>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label for="numWeeks" style="display: block; margin-bottom: 6px; color: var(--cargpt-muted);">Number of weeks</label>
                        <input type="number" id="numWeeks" class="cargpt-input" value="52" min="1" max="260" placeholder="52">
                    </div>
                    <button class="cargpt-btn cargpt-btn-primary" id="saveBtn">
                        <i class="fas fa-save"></i> Save
                    </button>
                </div>
            </section>

            <!-- Data List Section -->
            <section class="cargpt-card">
                <h2><i class="fas fa-list"></i> Stock List</h2>
                <div class="card-body">
                    <div id="stockListContainer">
                        <div class="cargpt-loading" id="stockListLoading">Loading...</div>
                        <div class="cargpt-table-wrap" id="stockTableWrap" style="display: none;">
                            <table class="cargpt-table">
                                <thead>
                                    <tr>
                                        <th>Symbol</th>
                                        <th>Stock Name</th>
                                        <th>Date Added</th>
                                    </tr>
                                </thead>
                                <tbody id="stockTableBody"></tbody>
                            </table>
                        </div>
                        <div class="cargpt-empty" id="stockListEmpty" style="display: none;">No stocks in list. Add symbols above and save.</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE = window.location.origin;

        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('leftMenu').classList.toggle('mobile-open');
        });

        document.getElementById('setupToggle').addEventListener('click', () => {
            const card = document.getElementById('setupCard');
            const caret = document.getElementById('setupCaret');
            card.classList.toggle('collapsed');
            caret.textContent = card.classList.contains('collapsed') ? '▶' : '▼';
        });

        async function loadConfig() {
            try {
                const r = await fetch(API_BASE + '/cargpt/config');
                if (r.ok) {
                    const d = await r.json();
                    document.getElementById('numWeeks').value = d.number_of_weeks || 52;
                }
            } catch (e) {
                console.warn('Could not load config:', e);
            }
        }

        async function loadStockList() {
            const loading = document.getElementById('stockListLoading');
            const wrap = document.getElementById('stockTableWrap');
            const empty = document.getElementById('stockListEmpty');
            loading.style.display = 'block';
            wrap.style.display = 'none';
            empty.style.display = 'none';
            try {
                const r = await fetch(API_BASE + '/cargpt/stock-list');
                const data = await r.json();
                loading.style.display = 'none';
                if (data && data.length > 0) {
                    wrap.style.display = 'block';
                    const tbody = document.getElementById('stockTableBody');
                    tbody.innerHTML = '';
                    for (const row of data) {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${row.symbol}</td>
                            <td>${row.stock_name || row.symbol}</td>
                            <td>${row.created_at ? new Date(row.created_at).toLocaleDateString() : '-'}</td>
                        `;
                        tbody.appendChild(tr);
                    }
                } else {
                    empty.style.display = 'block';
                }
            } catch (e) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                empty.textContent = 'Error loading list. Check API connection.';
                console.error(e);
            }
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const symbols = document.getElementById('stockList').value.trim();
            const numWeeks = parseInt(document.getElementById('numWeeks').value, 10) || 52;
            if (!symbols) {
                alert('Please enter at least one stock symbol.');
                return;
            }
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            try {
                const r = await fetch(API_BASE + '/cargpt/save-stock-list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbols, number_of_weeks: numWeeks })
                });
                const d = await r.json();
                if (d.success) {
                    alert(d.message || 'Saved.');
                    loadStockList();
                    loadConfig();
                } else {
                    alert(d.message || 'Save failed.');
                }
            } catch (e) {
                alert('Error saving: ' + (e.message || 'Network error'));
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Save';
            }
        });

        loadConfig();
        loadStockList();
    </script>
</body>
</html>
