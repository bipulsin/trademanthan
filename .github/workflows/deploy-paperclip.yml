name: Deploy to paperclip-vm
# Repository secret required (one of):
#   PAPERCLIP_SSH_PRIVATE_KEY  (preferred)
#   EC2_SSH_KEY, SSH_PRIVATE_KEY, PAPERCLIP_KEY
# Value: full PEM contents of ~/.ssh/paperclip_key

on:
  workflow_dispatch:
    inputs:
      rebuild:
        description: "REBUILD=1 local docker build on paperclip (fallback when GHCR pull is stale)"
        type: boolean
        default: true
      trademanthan_ref:
        description: "trademanthan git ref or SHA to deploy"
        type: string
        default: main
      run_rs_scan:
        description: "Run Relative Strength scan after deploy"
        type: boolean
        default: true
      environment:
        description: "GitHub Environment name if SSH secret is stored there (optional)"
        type: string
        default: ""
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "algos/**"
      - "scripts/trigger-paperclip-deploy.sh"
      - "scripts/paperclip-ssh.sh"
      - "scripts/setup-paperclip-ssh.sh"
      - "scripts/deploy-paperclip-now.sh"
      - ".github/workflows/deploy-paperclip.yml"

concurrency:
  group: deploy-paperclip
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve trademanthan ref
        id: ref
        run: |
          REF="${{ github.event.inputs.trademanthan_ref || 'main' }}"
          if [[ "$REF" == "main" || "$REF" == "master" ]]; then
            REF="${{ github.sha }}"
          fi
          echo "sha=$REF" >> "$GITHUB_OUTPUT"
          echo "Deploying trademanthan ref: $REF"

      - name: Setup SSH key from repository secrets
        id: ssh
        env:
          K_PAPERCLIP: ${{ secrets.PAPERCLIP_SSH_PRIVATE_KEY }}
          K_EC2: ${{ secrets.EC2_SSH_KEY }}
          K_SSH: ${{ secrets.SSH_PRIVATE_KEY }}
          K_SIMPLE: ${{ secrets.PAPERCLIP_KEY }}
          K_PAPERCLIP2: ${{ secrets.PAPERCLIP_SSH_KEY }}
          K_DEPLOY: ${{ secrets.DEPLOY_SSH_KEY }}
          K_GENERIC: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          KEY=""
          NAME=""
          if [ -n "$K_PAPERCLIP" ]; then KEY="$K_PAPERCLIP"; NAME="PAPERCLIP_SSH_PRIVATE_KEY"
          elif [ -n "$K_EC2" ]; then KEY="$K_EC2"; NAME="EC2_SSH_KEY"
          elif [ -n "$K_PAPERCLIP2" ]; then KEY="$K_PAPERCLIP2"; NAME="PAPERCLIP_SSH_KEY"
          elif [ -n "$K_SSH" ]; then KEY="$K_SSH"; NAME="SSH_PRIVATE_KEY"
          elif [ -n "$K_SIMPLE" ]; then KEY="$K_SIMPLE"; NAME="PAPERCLIP_KEY"
          elif [ -n "$K_DEPLOY" ]; then KEY="$K_DEPLOY"; NAME="DEPLOY_SSH_KEY"
          elif [ -n "$K_GENERIC" ]; then KEY="$K_GENERIC"; NAME="SSH_KEY"
          fi
          if [ -z "$KEY" ]; then
            echo "::error::No SSH repository secret visible to Actions on bipulsin/trademanthan."
            echo "::error::Add Settings → Secrets and variables → Actions → Repository secrets (not Dependabot/Codespaces)."
            echo "::error::Name must be exactly PAPERCLIP_SSH_PRIVATE_KEY (full paperclip_key PEM, including BEGIN/END lines)."
            exit 1
          fi
          echo "Using repository secret: $NAME"
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/paperclip_key
          chmod 600 ~/.ssh/paperclip_key
          ssh-keyscan -H 140.245.14.17 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keygen -y -f ~/.ssh/paperclip_key >/dev/null

      - name: Deploy on paperclip-vm
        env:
          REBUILD: ${{ github.event_name == 'push' && '1' || (github.event.inputs.rebuild == false && '0' || '1') }}
          TRADEMANTHAN_REF: ${{ steps.ref.outputs.sha }}
          APP_SRC_REV: ${{ steps.ref.outputs.sha }}
          FRONTEND_SRC_REV: ${{ steps.ref.outputs.sha }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/paperclip_key -o ConnectTimeout=25 ubuntu@140.245.14.17 \
            "REBUILD=${REBUILD} TRADEMANTHAN_REF=${TRADEMANTHAN_REF} APP_SRC_REV=${APP_SRC_REV} FRONTEND_SRC_REV=${FRONTEND_SRC_REV} bash -s" <<'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/twcto
          export REBUILD="${REBUILD:-1}"
          export TRADEMANTHAN_REF="${TRADEMANTHAN_REF:-main}"
          export APP_SRC_REV="${APP_SRC_REV:-${TRADEMANTHAN_REF}}"
          export FRONTEND_SRC_REV="${FRONTEND_SRC_REV:-${TRADEMANTHAN_REF}}"
          echo "[gha] git pull twcto_docker..."
          git fetch origin main
          git reset --hard origin/main
          if [[ "${REBUILD}" == "1" ]]; then
            echo "[gha] REBUILD=1 building app + nginx (rev ${TRADEMANTHAN_REF:0:12})..."
            docker compose build app nginx
          else
            echo "[gha] pulling app + nginx from GHCR..."
            docker compose pull app nginx
          fi
          docker compose up -d --force-recreate app nginx
          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/scan/health >/dev/null 2>&1; then
              echo "[gha] healthy"
              curl -fsS http://127.0.0.1:8080/scan/health | head -c 300
              echo ""
              exit 0
            fi
            sleep 3
          done
          echo "[gha] health check timed out" >&2
          docker compose ps
          exit 1
          REMOTE

      - name: Run Relative Strength scan
        if: github.event_name == 'push' || github.event.inputs.run_rs_scan != false
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/paperclip_key -o ConnectTimeout=25 ubuntu@140.245.14.17 bash -s <<'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/twcto
          docker compose exec -T app python3 -c 'from backend.services.relative_strength_scanner import run_relative_strength_scan; import json; print(json.dumps(run_relative_strength_scan(scan_trigger="manual_gha", cache_only=False), default=str))'
          REMOTE

      - name: Verify public health
        run: |
          curl -fsS --max-time 30 "https://www.tradewithcto.com/scan/health" | head -c 300
          echo ""
