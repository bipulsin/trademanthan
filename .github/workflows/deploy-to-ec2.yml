# Auto-deploy to EC2 on push to main
#
# Setup: Add these secrets in GitHub repo Settings → Secrets and variables → Actions:
#   EC2_HOST    - EC2 IP or hostname (e.g. 3.6.199.247)
#   EC2_USER   - SSH user (e.g. ubuntu)
#   EC2_SSH_KEY - Contents of your .pem file (private key)
#
# Update host after migration (CLI, requires gh auth: gh auth login):
#   gh secret set EC2_HOST --body "3.6.199.247"

name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/trademanthan
            echo "Pulling latest from GitHub..."
            git stash > /dev/null 2>&1 || true
            git pull origin main
            echo "Running CAR migration if needed..."
            python3 backend/migrations/add_carstocklist.py 2>/dev/null || true
            echo "Restarting backend..."
            sudo systemctl restart trademanthan-backend
            echo "Updating Nginx config for tradentical.com..."
            if [ -f /home/ubuntu/trademanthan/scripts/nginx-tradentical.conf ]; then
              sudo cp /home/ubuntu/trademanthan/scripts/nginx-tradentical.conf /etc/nginx/sites-available/tradentical
              sudo ln -sf /etc/nginx/sites-available/tradentical /etc/nginx/sites-enabled/
            fi
            echo "Reloading Nginx..."
            sudo nginx -t 2>/dev/null && sudo systemctl reload nginx
            echo "Checking services..."
            systemctl is-active trademanthan-backend && echo "✓ Backend running" || (echo "✗ Backend failed"; exit 1)
            systemctl is-active nginx && echo "✓ Nginx running" || (echo "✗ Nginx failed"; exit 1)
            echo "Deployment complete!"
