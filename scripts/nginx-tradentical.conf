# Nginx — canonical site: https://www.tradewithcto.com
# trademanthan.in + tradentical.com (and apex www variants) redirect here only.
# 3.6.199.247 in server_name allows access via IP while DNS propagates (HTTP only; HTTPS will show cert warning).
# Cert paths: certbot creates /etc/letsencrypt/live/tradentical.com/ (first -d name; expand SANs for all hostnames).
# Run: sudo cp nginx-tradentical.conf /etc/nginx/sites-available/tradentical
#      sudo ln -sf /etc/nginx/sites-available/tradentical /etc/nginx/sites-enabled/
#      See scripts/setup_ssl_tradentical.sh for certbot -d list (must include legacy names for HTTPS redirects).
#
# Apex tradewithcto.com → www: some clients/DNS or Google Sign-In only list www; redirect keeps one canonical URL.

server {
    listen 80;
    server_name tradewithcto.com;
    return 301 https://www.tradewithcto.com$request_uri;
}

server {
    listen 443 ssl;
    server_name tradewithcto.com;
    ssl_certificate /etc/letsencrypt/live/tradentical.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradentical.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.tradewithcto.com$request_uri;
}

# Legacy domains → canonical (HTTP)
server {
    listen 80;
    server_name tradentical.com www.tradentical.com trademanthan.in www.trademanthan.in;
    return 301 https://www.tradewithcto.com$request_uri;
}

# Legacy domains → canonical (HTTPS; cert must list these SANs — run certbot expand)
server {
    listen 443 ssl;
    server_name tradentical.com www.tradentical.com trademanthan.in www.trademanthan.in;
    ssl_certificate /etc/letsencrypt/live/tradentical.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradentical.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.tradewithcto.com$request_uri;
}

server {
    listen 80;
    server_name www.tradewithcto.com 3.6.199.247;

    # Backend API — preserve /api prefix (FastAPI routes are /api/...)
    location ^~ /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # CAR GPT endpoints
    location ^~ /cargpt/ {
        proxy_pass http://localhost:8000/cargpt/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Auth endpoints (Google OAuth)
    location ^~ /auth/ {
        proxy_pass http://localhost:8000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Scan endpoints
    location ^~ /scan/ {
        proxy_pass http://localhost:8000/scan/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location ^~ /static/ {
        alias /home/ubuntu/trademanthan/frontend/public/;
    }

    # Landing / SPA entry: do not cache / or /index.html (normal mode often keeps stale HTML/JS otherwise)
    location = / {
        root /home/ubuntu/trademanthan/frontend/public;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location = /index.html {
        root /home/ubuntu/trademanthan/frontend/public;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    # Frontend
    location / {
        root /home/ubuntu/trademanthan/frontend/public;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Last-Modified $date_gmt;
            if_modified_since off;
            etag off;
        }
    }
}

