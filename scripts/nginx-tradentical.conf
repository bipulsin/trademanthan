# Nginx config for tradentical.com + tradewithcto.com - HTTP + HTTPS
# 3.109.48.23 in server_name allows access via IP while DNS propagates (HTTP only; HTTPS will show cert warning).
# Cert paths: certbot creates /etc/letsencrypt/live/tradentical.com/
# Run: sudo cp nginx-tradentical.conf /etc/nginx/sites-available/tradentical
#      sudo ln -sf /etc/nginx/sites-available/tradentical /etc/nginx/sites-enabled/
#      sudo certbot --nginx -d tradentical.com -d www.tradentical.com -d tradewithcto.com  # if cert not yet created

server {
    listen 80;
    server_name tradentical.com www.tradentical.com tradewithcto.com 3.109.48.23;

    # Backend API
    location ^~ /api/ {
        proxy_pass http://localhost:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # CAR GPT endpoints
    location ^~ /cargpt/ {
        proxy_pass http://localhost:8000/cargpt/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Auth endpoints (Google OAuth)
    location ^~ /auth/ {
        proxy_pass http://localhost:8000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Scan endpoints
    location ^~ /scan/ {
        proxy_pass http://localhost:8000/scan/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location ^~ /static/ {
        alias /home/ubuntu/trademanthan/frontend/public/;
    }

    # Frontend
    location / {
        root /home/ubuntu/trademanthan/frontend/public;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Last-Modified $date_gmt;
            if_modified_since off;
            etag off;
        }
    }
}

# HTTPS - uses certbot-managed cert (run certbot first if cert doesn't exist)
server {
    listen 443 ssl;
    server_name tradentical.com www.tradentical.com tradewithcto.com 3.109.48.23;

    ssl_certificate /etc/letsencrypt/live/tradentical.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradentical.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Backend API
    location ^~ /api/ {
