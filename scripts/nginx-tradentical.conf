# Nginx config for tradentical.com - HTTP (Certbot will add HTTPS)
# Run: sudo cp nginx-tradentical.conf /etc/nginx/sites-available/tradentical
#      sudo ln -sf /etc/nginx/sites-available/tradentical /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo certbot --nginx -d tradentical.com -d www.tradentical.com

server {
    listen 80;
    server_name tradentical.com www.tradentical.com;

    # Backend API
    location ^~ /api/ {
        proxy_pass http://localhost:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Scan endpoints
    location ^~ /scan/ {
        proxy_pass http://localhost:8000/scan/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location ^~ /static/ {
        alias /home/ubuntu/trademanthan/frontend/public/;
    }

    # Frontend
    location / {
        root /home/ubuntu/trademanthan/frontend/public;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Last-Modified $date_gmt;
            if_modified_since off;
            etag off;
        }
    }
}
